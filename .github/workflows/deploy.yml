name: Deploy Frontend to Amazon ECS

on:
  push:
    branches: [ "main" ] 

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tienda-perritos-frontend
  ECS_CLUSTER: cluster-tienda-perritos-v2
  ECS_SERVICE: srv-tienda-perritos-frontend

jobs:
  deploy:
    name: Build, Push and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

    - name: Force ECS Deployment
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment
