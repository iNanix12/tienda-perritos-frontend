name: Deploy Frontend to EC2

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Usamos la acción oficial para construir, es más limpia y maneja mejor las rutas
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .             # <--- SI TU DOCKERFILE ESTÁ DENTRO DE UNA CARPETA FRONTEND, CAMBIA EL . POR ./frontend
        file: ./Dockerfile     # <--- SI ESTÁ EN UNA CARPETA, CAMBIA A ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_FRONTEND_HOST }}
        username: ec2-user     # <--- CAMBIADO DE "ubuntu" A "ec2-user" (Estándar en AWS Academy)
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # NOTA: Si usas docker-compose en la EC2 del frontend, descomenta las siguientes líneas
          # y edita la ruta a la carpeta de tu proyecto en la máquina virtual:
          # cd /home/ec2-user/tienda-perritos-frontend
          # git pull origin deploy
          # export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          # docker-compose down || true
          # docker-compose pull
          # docker-compose up -d

          # SI NO USAS DOCKER-COMPOSE EN EL FRONTEND, DEJA ESTAS LÍNEAS ACTIVAS:
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest
          docker stop tienda-frontend || true
          docker rm tienda-frontend || true
          docker run -d -p 80:80 --name tienda-frontend ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest
