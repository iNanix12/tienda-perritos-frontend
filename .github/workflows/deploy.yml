name: Deploy Frontend to EC2

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_FRONTEND_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest
          docker stop tienda-frontend || true
          docker rm tienda-frontend || true
          docker run -d -p 80:80 --name tienda-frontend ${{ secrets.DOCKERHUB_USERNAME }}/tienda-frontend:latest
